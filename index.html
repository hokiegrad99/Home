<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>App Dashboard — Landing Page</title>
  <meta name="description" content="Landing page for all applications.">
  <style>
    :root {
      --bg: #0b0f19;
      --bg-elevated: #111827;
      --bg-card: #1a2236;
      --border: #253049;
      --text: #e2e8f0;
      --text-muted: #94a3b8;
      --accent: #6366f1;
      --accent-hover: #818cf8;
      --success: #22c55e;
      --warning: #f59e0b;
      --danger: #ef4444;
      --radius: 16px;
      --radius-sm: 10px;
      --shadow: 0 4px 20px rgba(0,0,0,0.35);
      --shadow-lg: 0 10px 40px rgba(0,0,0,0.45);
      --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }

    [data-theme="light"] {
      --bg: #f1f5f9;
      --bg-elevated: #ffffff;
      --bg-card: #ffffff;
      --border: #e2e8f0;
      --text: #1e293b;
      --text-muted: #64748b;
      --shadow: 0 4px 20px rgba(0,0,0,0.08);
      --shadow-lg: 0 10px 40px rgba(0,0,0,0.12);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
      transition: background 0.3s, color 0.3s;
    }

    /* Header */
    .header {
      background: var(--bg-elevated);
      border-bottom: 1px solid var(--border);
      padding: 20px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 50;
      backdrop-filter: blur(12px);
      transition: background 0.3s, border-color 0.3s;
    }

    .header-brand {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .header-brand .logo {
      width: 42px;
      height: 42px;
      border-radius: var(--radius-sm);
      background: linear-gradient(135deg, var(--accent), #8b5cf6);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
      font-weight: 700;
      color: #fff;
      box-shadow: 0 2px 10px rgba(99, 102, 241, 0.35);
    }

    .header-brand h1 {
      font-size: 1.35rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .header-brand p {
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 18px;
      border-radius: var(--radius-sm);
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--bg-card);
      color: var(--text);
      transition: var(--transition);
    }

    .btn:hover {
      border-color: var(--accent);
      color: var(--accent-hover);
      transform: translateY(-1px);
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), #8b5cf6);
      border-color: transparent;
      color: #fff;
    }

    .btn-primary:hover {
      opacity: 0.92;
      color: #fff;
    }

    .btn-ghost {
      background: transparent;
      border-color: transparent;
    }

    .btn-ghost:hover {
      background: var(--bg-card);
    }

    .btn-icon {
      padding: 10px;
      border-radius: 50%;
    }

    /* Main */
    .main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 32px 80px;
    }

    .section-header {
      margin-bottom: 32px;
    }

    .section-header h2 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .section-header p {
      color: var(--text-muted);
      font-size: 0.95rem;
    }

    /* Tiles Grid */
    .tiles-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 24px;
      position: relative;
    }

    .drop-indicator {
      display: none;
      position: absolute;
      width: 4px;
      background: linear-gradient(to bottom, var(--accent), #8b5cf6);
      border-radius: 2px;
      opacity: 0.85;
      pointer-events: none;
      z-index: 10;
      transition: all 0.15s ease-out;
      box-shadow: 0 0 8px rgba(99, 102, 241, 0.4);
    }

    .drop-indicator.active {
      display: block;
    }

    .tile {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px 24px;
      text-decoration: none;
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 16px;
      transition: var(--transition);
      position: relative;
      overflow: hidden;
      cursor: pointer;
    }

    .tile::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: var(--tile-color, var(--accent));
      opacity: 0.85;
      transition: opacity 0.2s;
    }

    .tile:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-lg);
      border-color: var(--tile-color, var(--accent));
    }

    .tile:hover::before {
      opacity: 1;
    }

    .tile-icon {
      width: 52px;
      height: 52px;
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      background: var(--tile-bg, rgba(99, 102, 241, 0.12));
      color: var(--tile-color, var(--accent));
      transition: var(--transition);
    }

    .tile:hover .tile-icon {
      transform: scale(1.08);
    }

    .tile-title {
      font-size: 1.15rem;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .tile-desc {
      font-size: 0.85rem;
      color: var(--text-muted);
      line-height: 1.5;
    }

    .tile-arrow {
      margin-top: auto;
      padding-top: 12px;
      font-size: 1.1rem;
      color: var(--text-muted);
      transition: var(--transition);
      align-self: flex-end;
    }

    .tile:hover .tile-arrow {
      color: var(--tile-color, var(--accent));
      transform: translateX(4px);
    }

    .tile-actions {
      display: none;
      position: absolute;
      top: 12px;
      right: 12px;
      gap: 6px;
    }

    .tile-actions button {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg-card);
      color: var(--text);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.85rem;
      transition: var(--transition);
    }

    .tile-actions button:hover {
      background: var(--tile-color, var(--accent));
      color: #fff;
      border-color: var(--tile-color, var(--accent));
    }

    .admin-mode .tile-actions {
      display: flex;
    }

    .admin-mode .tile {
      cursor: default;
    }

    .admin-mode .tile:hover {
      transform: none;
      box-shadow: var(--shadow);
    }

    .admin-mode .tile {
      cursor: grab;
    }

    .admin-mode .tile:active {
      cursor: grabbing;
    }

    .tile.dragging {
      opacity: 0.4;
      transform: scale(0.98);
    }

    .tile.drag-over {
      border: 2px dashed var(--accent);
      background: rgba(99, 102, 241, 0.08);
    }

    .tile-actions .drag-handle {
      cursor: grab;
      font-size: 1rem;
    }

    .tile-actions .drag-handle:active {
      cursor: grabbing;
    }

    /* Add Tile Button */
    .tile-add {
      background: transparent;
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 28px 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--text-muted);
      cursor: pointer;
      transition: var(--transition);
      min-height: 180px;
    }

    .tile-add:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(99, 102, 241, 0.05);
    }

    .tile-add .add-icon {
      font-size: 2rem;
      font-weight: 300;
    }

    .tile-add span {
      font-size: 0.95rem;
      font-weight: 600;
    }

    .admin-mode .tile-add {
      display: flex;
    }

    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(6px);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .modal-overlay.active {
      display: flex;
    }

    .modal {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow-lg);
      width: 100%;
      max-width: 440px;
      padding: 28px;
      animation: modalIn 0.3s ease-out;
    }

    @keyframes modalIn {
      from { opacity: 0; transform: translateY(16px) scale(0.97); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }

    .modal-header h3 {
      font-size: 1.2rem;
      font-weight: 700;
    }

    .modal-close {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: none;
      background: var(--bg);
      color: var(--text);
      cursor: pointer;
      font-size: 1.2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: var(--transition);
    }

    .modal-close:hover {
      background: var(--danger);
      color: #fff;
    }

    .form-group {
      margin-bottom: 18px;
    }

    .form-group label {
      display: block;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    .form-group input,
    .form-group select {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--bg);
      color: var(--text);
      font-size: 0.95rem;
      transition: var(--transition);
    }

    .form-group input:focus,
    .form-group select:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
    }

    .color-presets {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 8px;
    }

    .color-preset {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      cursor: pointer;
      border: 2px solid transparent;
      transition: var(--transition);
    }

    .color-preset:hover {
      transform: scale(1.1);
    }

    .color-preset.active {
      border-color: var(--text);
      box-shadow: 0 0 0 2px var(--bg-card), 0 0 0 4px var(--text);
    }

    .emoji-presets {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 8px;
      max-height: 120px;
      overflow-y: auto;
      padding: 4px;
    }

    .emoji-preset {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      cursor: pointer;
      border: 2px solid transparent;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
      transition: var(--transition);
    }

    .emoji-preset:hover {
      transform: scale(1.15);
      background: var(--bg-elevated);
    }

    .emoji-preset.active {
      border-color: var(--accent);
      background: var(--bg-elevated);
      box-shadow: 0 0 0 2px var(--bg-card), 0 0 0 4px var(--accent);
    }

    .emoji-search {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--bg);
      color: var(--text);
      font-size: 0.95rem;
      margin-bottom: 8px;
      transition: var(--transition);
    }

    .emoji-search:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
    }

    .emoji-search::placeholder {
      color: var(--text-muted);
      opacity: 0.7;
    }

    .modal-actions {
      display: flex;
      gap: 10px;
      margin-top: 24px;
    }

    .modal-actions .btn {
      flex: 1;
      justify-content: center;
    }

    .modal-actions .btn-danger {
      background: var(--danger);
      border-color: transparent;
      color: #fff;
    }

    .modal-actions .btn-danger:hover {
      opacity: 0.85;
      color: #fff;
    }

    /* Admin Login Modal */
    .admin-login .modal {
      max-width: 360px;
      text-align: center;
    }

    .admin-login .lock-icon {
      font-size: 2.5rem;
      margin-bottom: 12px;
    }

    .admin-login p {
      color: var(--text-muted);
      font-size: 0.9rem;
      margin-bottom: 20px;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 14px 20px;
      box-shadow: var(--shadow-lg);
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.9rem;
      font-weight: 500;
      z-index: 200;
      transform: translateY(100px);
      opacity: 0;
      transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .toast.show {
      transform: translateY(0);
      opacity: 1;
    }

    .toast.success { border-left: 4px solid var(--success); }
    .toast.error { border-left: 4px solid var(--danger); }

    /* Footer */
    .footer {
      text-align: center;
      padding: 32px;
      color: var(--text-muted);
      font-size: 0.82rem;
      border-top: 1px solid var(--border);
    }

    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }

    .empty-state-icon {
      font-size: 3rem;
      margin-bottom: 16px;
      opacity: 0.5;
    }

    /* Responsive */
    @media (max-width: 640px) {
      .header { padding: 16px 20px; }
      .header-brand h1 { font-size: 1.1rem; }
      .main { padding: 24px 20px 60px; }
      .tiles-grid { grid-template-columns: 1fr; }
      .header-actions .btn span.label { display: none; }
    }
  </style>
</head>
<body>

  <header class="header">
    <div class="header-brand">
      <div class="logo">A</div>
      <div>
        <h1>App Dashboard</h1>
        <p>All your applications in one place</p>
      </div>
    </div>
    <div class="header-actions">
      <button class="btn btn-ghost" id="themeBtn" onclick="toggleTheme()" title="Toggle theme" aria-label="Toggle dark mode">
        <span id="themeIcon">🌙</span>
        <span class="label" id="themeLabel">Dark</span>
      </button>
      <button class="btn" id="adminBtn" onclick="toggleAdmin()">
        <span id="adminBtnText">🔒 Admin</span>
      </button>
    </div>
  </header>

  <main class="main">
    <div class="section-header">
      <h2>Applications</h2>
      <p>Click any tile to open the application. Admin mode lets you edit tiles.</p>
    </div>
    <div class="tiles-grid" id="tilesGrid"></div>
  </main>

  <footer class="footer">
    <p>App Dashboard — Landing page for all applications</p>
  </footer>

  <!-- Admin Login Modal -->
  <div class="modal-overlay admin-login" id="loginModal">
    <div class="modal">
      <div class="lock-icon">🔐</div>
      <h3>Administrator Access</h3>
      <p>Enter the admin password to manage tiles.</p>
      <div class="form-group">
        <input type="password" id="adminPassword" placeholder="Password" onkeydown="if(event.key==='Enter')loginAdmin()">
      </div>
      <div class="modal-actions">
        <button class="btn" onclick="closeLoginModal()">Cancel</button>
        <button class="btn btn-primary" onclick="loginAdmin()">Unlock</button>
      </div>
    </div>
  </div>

  <!-- Edit/Add Tile Modal -->
  <div class="modal-overlay" id="tileModal">

        <button class="modal-close" onclick="closeTileModal()">&times;</button>

      <div class="form-group">
        <label>Application Name</label>
        <input type="text" id="tileName" placeholder="e.g. MortCalc">
      </div>
      <div class="form-group">
        <label>Description</label>
        <input type="text" id="tileDesc" placeholder="Short description">
      </div>
      <div class="form-group">
        <label>Path / URL</label>
        <input type="text" id="tilePath" placeholder="e.g. /MortCalc or https://example.com">
      </div>
      <div class="form-group">
        <label>Icon (emoji)</label>
        <input type="text" id="tileIcon" placeholder="e.g. 🏠">
        <input type="text" id="emojiSearch" class="emoji-search" placeholder="Search emojis... (e.g. house, money, chart)" oninput="renderEmojiPresets(this.value)">
        <div class="emoji-presets" id="emojiPresets"></div>
      </div>
      <div class="form-group">
        <label>Color</label>
        <div class="color-presets" id="colorPresets"></div>
      </div>
      <div class="modal-actions">
        <button class="btn btn-danger" id="deleteTileBtn" onclick="deleteCurrentTile()">Delete</button>
        <button class="btn" onclick="closeTileModal()">Cancel</button>
        <button class="btn btn-primary" onclick="saveTile()">Save</button>
      </div>
    </div>
  </div>

      '🪛': 'screwdriver tool repair',
      '🔧': 'wrench tool settings spanner',
      '🪜': 'ladder climb tool step',
      '🧰': 'toolbox toolkit repair mechanic',
      '📦': 'package box parcel delivery shipping',
      '📫': 'mailbox closed flag post',
      '📬': 'mailbox open flag mail',
      '📪': 'mailbox closed no flag',
      '📭': 'mailbox lowered flag empty',
      '📮': 'postbox mail drop letter',
      '🗳️': 'ballot box vote election',
      '✉️': 'envelope mail letter message',
      '📩': 'envelope arrow email incoming',
      '📨': 'incoming envelope mail receive',
      '📧': 'e-mail email message letter',
      '📤': 'outbox tray send upload',
      '📥': 'inbox tray receive download',
      '🚗': 'car automobile vehicle drive transport',
      '🏥': 'hospital medical emergency clinic'
    };

    const ADMIN_PASSWORD = 'Beerp0ng'; // Change this to your preferred password
    const STORAGE_KEY = 'app-dashboard-tiles';
    const ADMIN_KEY = 'app-dashboard-admin';

    // ==================== State ====================
    let tiles = [];
    let isAdmin = false;
    let editingId = null;
    let selectedColor = COLOR_PRESETS[0];
    let isDragging = false;
    let dragSrcIndex = null;

    // ==================== Init ====================
    function init() {
      loadTheme();
      loadTiles();
      renderTiles();
      renderColorPresets();
      const grid = document.getElementById('tilesGrid');
      grid.addEventListener('dragover', handleGridDragOver);
      grid.addEventListener('dragleave', handleGridDragLeave);
      grid.addEventListener('drop', handleGridDrop);
    }

    // ==================== Theme ====================
    function loadTheme() {
      const saved = localStorage.getItem('app-dashboard-theme');
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      const isLight = saved === 'light' || (!saved && !prefersDark);
      const icon = document.getElementById('themeIcon');
      const label = document.getElementById('themeLabel');
      if (isLight) {
        document.documentElement.setAttribute('data-theme', 'light');
        icon.textContent = '☀️';
        label.textContent = 'Light';
      } else {
        document.documentElement.removeAttribute('data-theme');
        icon.textContent = '🌙';
        label.textContent = 'Dark';
      }
    }

    function toggleTheme() {
      const isLight = document.documentElement.getAttribute('data-theme') === 'light';
      const icon = document.getElementById('themeIcon');
      const label = document.getElementById('themeLabel');
      if (isLight) {
        document.documentElement.removeAttribute('data-theme');
        localStorage.setItem('app-dashboard-theme', 'dark');
        icon.textContent = '🌙';
        label.textContent = 'Dark';
      } else {
        document.documentElement.setAttribute('data-theme', 'light');
        localStorage.setItem('app-dashboard-theme', 'light');
        icon.textContent = '☀️';
        label.textContent = 'Light';
      }
    }

    // ==================== Tiles ====================
    function loadTiles() {
      try {
        const saved = localStorage.getItem(STORAGE_KEY);
        tiles = saved ? JSON.parse(saved) : JSON.parse(JSON.stringify(DEFAULT_TILES));
      } catch (e) {
        tiles = JSON.parse(JSON.stringify(DEFAULT_TILES));
      }
    }

    function saveTiles() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(tiles));
    }

    function renderTiles() {
      const grid = document.getElementById('tilesGrid');
      grid.innerHTML = '';

      if (tiles.length === 0) {
        grid.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">📭</div>
            <h3>No applications</h3>
            <p>Enter admin mode to add your first application tile.</p>
          </div>
        `;
        return;
      }

      tiles.forEach((tile, index) => {
        const el = document.createElement('a');
        el.className = 'tile';
        el.href = isAdmin ? 'javascript:void(0)' : tile.path;
        el.style.setProperty('--tile-color', tile.color);
        el.style.setProperty('--tile-bg', hexToRgba(tile.color, 0.12));
        el.innerHTML = `
          <div class="tile-actions">
            <button class="drag-handle" title="Drag to reorder" onclick="event.preventDefault(); event.stopPropagation();">☰</button>
            <button onclick="event.preventDefault(); event.stopPropagation(); openTileModal('${tile.id}')" title="Edit">✏️</button>
          </div>
          <div class="tile-icon">${tile.icon}</div>
          <div>
            <div class="tile-title">${escapeHtml(tile.name)}</div>
            <div class="tile-desc">${escapeHtml(tile.desc)}</div>
          </div>
          <div class="tile-arrow">→</div>
        `;
        if (!isAdmin) {
          el.addEventListener('click', (e) => {
            // Let the href handle navigation, but ensure relative paths work on GitHub Pages
            if (tile.path.startsWith('/')) {
              e.preventDefault();
              window.location.href = '.' + tile.path;
            }
          });
        } else {
          el.addEventListener('click', (e) => {
            if (isDragging) {
              e.preventDefault();
              e.stopPropagation();
              return;
            }
            e.preventDefault();
            openTileModal(tile.id);
          });
          el.draggable = true;
          el.dataset.index = index;
          el.addEventListener('dragstart', handleDragStart);
          el.addEventListener('dragover', handleDragOver);
          el.addEventListener('dragenter', handleDragEnter);
          el.addEventListener('dragleave', handleDragLeave);
          el.addEventListener('drop', handleDrop);
          el.addEventListener('dragend', handleDragEnd);
        }
        grid.appendChild(el);
      });

      if (isAdmin) {
        const addBtn = document.createElement('div');
        addBtn.className = 'tile-add';
        addBtn.innerHTML = `<div class="add-icon">+</div><span>Add Application</span>`;
        addBtn.onclick = () => openTileModal(null);
        grid.appendChild(addBtn);
      }

      document.body.classList.toggle('admin-mode', isAdmin);
      ensureDropIndicator();
    }

    // ==================== Admin ====================
    function toggleAdmin() {
      if (isAdmin) {
        isAdmin = false;
        localStorage.removeItem(ADMIN_KEY);
        document.getElementById('adminBtnText').textContent = '🔒 Admin';
        renderTiles();
        showToast('Admin mode disabled', 'success');
      } else {
        document.getElementById('loginModal').classList.add('active');
        setTimeout(() => document.getElementById('adminPassword').focus(), 100);
      }
    }

    function loginAdmin() {
      const password = document.getElementById('adminPassword').value;
      if (password === ADMIN_PASSWORD) {
        isAdmin = true;
        localStorage.setItem(ADMIN_KEY, 'true');
        document.getElementById('adminBtnText').textContent = '🔓 Admin';
        document.getElementById('adminPassword').value = '';
        closeLoginModal();
        renderTiles();
        showToast('Admin mode enabled', 'success');
      } else {
        showToast('Incorrect password', 'error');
        document.getElementById('adminPassword').value = '';
        document.getElementById('adminPassword').focus();
      }
    }

    function closeLoginModal() {
      document.getElementById('loginModal').classList.remove('active');
      document.getElementById('adminPassword').value = '';
    }

    // Check if admin was previously logged in this session
    (function checkAdminSession() {
      if (localStorage.getItem(ADMIN_KEY) === 'true') {
        isAdmin = true;
        document.getElementById('adminBtnText').textContent = '🔓 Admin';
      }
    })();

    // ==================== Drag & Drop ====================
    function handleDragStart(e) {
      isDragging = true;
      dragSrcIndex = parseInt(this.dataset.index, 10);
      this.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', this.dataset.index);
    }

    function handleDragOver(e) {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
    }

    function handleDragEnter(e) {
      this.classList.add('drag-over');
    }

    function handleDragLeave(e) {
      if (!this.contains(e.relatedTarget)) {
        this.classList.remove('drag-over');
      }
    }

    function handleDrop(e) {
      e.stopPropagation();
      e.preventDefault();
      this.classList.remove('drag-over');
      hideDropIndicator();
      const fromIndex = parseInt(e.dataTransfer.getData('text/plain'), 10);
      const toIndex = parseInt(this.dataset.index, 10);
      if (isNaN(fromIndex) || isNaN(toIndex) || fromIndex === toIndex) return;
      const movedTile = tiles.splice(fromIndex, 1)[0];
      tiles.splice(toIndex, 0, movedTile);
      saveTiles();
      renderTiles();
      showToast('Tile reordered', 'success');
    }

    function handleDragEnd() {
      this.classList.remove('dragging');
      document.querySelectorAll('.tile').forEach(tile => tile.classList.remove('drag-over'));
      hideDropIndicator();
      dragSrcIndex = null;
      setTimeout(() => { isDragging = false; }, 50);
    }

    // ==================== Grid Drop Zone ====================
    function ensureDropIndicator() {
      const grid = document.getElementById('tilesGrid');
      let indicator = document.getElementById('dropIndicator');
      if (!indicator) {
        indicator = document.createElement('div');
        indicator.id = 'dropIndicator';
        indicator.className = 'drop-indicator';
        grid.appendChild(indicator);
      }
    }

    function hideDropIndicator() {
      const indicator = document.getElementById('dropIndicator');
      if (indicator) indicator.classList.remove('active');
    }

    function getDragInsertIndex(e) {
      const grid = document.getElementById('tilesGrid');
      const tileElements = Array.from(grid.querySelectorAll('.tile'));
      if (tileElements.length === 0) return 0;

      const mouseX = e.clientX;
      const mouseY = e.clientY;

      let closestIndex = 0;
      let closestDist = Infinity;

      tileElements.forEach((tile, i) => {
        const rect = tile.getBoundingClientRect();
        const centerX = rect.left + rect.width / 2;
        const centerY = rect.top + rect.height / 2;
        const dist = Math.hypot(mouseX - centerX, mouseY - centerY);
        if (dist < closestDist) {
          closestDist = dist;
          closestIndex = i;
        }
      });

      const closestTile = tileElements[closestIndex];
      const rect = closestTile.getBoundingClientRect();
      const centerX = rect.left + rect.width / 2;

      if (mouseX > centerX) {
        return closestIndex + 1;
      }
      return closestIndex;
    }

    function positionDropIndicator(insertIndex) {
      const indicator = document.getElementById('dropIndicator');
      const grid = document.getElementById('tilesGrid');
      const tileElements = Array.from(grid.querySelectorAll('.tile'));

      if (!indicator || tileElements.length === 0) {
        if (indicator) indicator.classList.remove('active');
        return;
      }

      const gridRect = grid.getBoundingClientRect();
      let targetTile, side;

      if (insertIndex <= 0) {
        targetTile = tileElements[0];
        side = 'left';
      } else if (insertIndex >= tileElements.length) {
        targetTile = tileElements[tileElements.length - 1];
        side = 'right';
      } else {
        targetTile = tileElements[insertIndex];
        side = 'left';
      }

      const rect = targetTile.getBoundingClientRect();
      const left = (side === 'left' ? rect.left : rect.right) - gridRect.left;
      const top = rect.top - gridRect.top;
      const height = rect.height;

      indicator.style.left = (left - 2) + 'px';
      indicator.style.top = top + 'px';
      indicator.style.height = height + 'px';
      indicator.classList.add('active');
    }

    function handleGridDragOver(e) {
      if (dragSrcIndex === null) return;
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      const insertIndex = getDragInsertIndex(e);
      if (insertIndex !== null) {
        positionDropIndicator(insertIndex);
      }
    }

    function handleGridDragLeave(e) {
      const grid = document.getElementById('tilesGrid');
      if (!grid.contains(e.relatedTarget)) {
        hideDropIndicator();
      }
    }

    function handleGridDrop(e) {
      e.preventDefault();
      e.stopPropagation();
      hideDropIndicator();
      const fromIndex = parseInt(e.dataTransfer.getData('text/plain'), 10);
      const insertIndex = getDragInsertIndex(e);
      dragSrcIndex = null;
      if (isNaN(fromIndex) || insertIndex === null) return;
      if (fromIndex === insertIndex || fromIndex + 1 === insertIndex) return;
      const movedTile = tiles.splice(fromIndex, 1)[0];
      const toIndex = insertIndex > fromIndex ? insertIndex - 1 : insertIndex;
      tiles.splice(toIndex, 0, movedTile);
      saveTiles();
      renderTiles();
      showToast('Tile reordered', 'success');
    }

    // ==================== Tile Modal ====================
    function openTileModal(id) {
      editingId = id;
      const modal = document.getElementById('tileModal');
      const title = document.getElementById('tileModalTitle');
      const deleteBtn = document.getElementById('deleteTileBtn');

      if (id) {
        const tile = tiles.find(t => t.id === id);
        if (!tile) return;
        title.textContent = 'Edit Tile';
        document.getElementById('tileName').value = tile.name;
        document.getElementById('tileDesc').value = tile.desc;
        document.getElementById('tilePath').value = tile.path;
        document.getElementById('tileIcon').value = tile.icon;
        selectedColor = tile.color;
        deleteBtn.style.display = 'inline-flex';
      } else {
        title.textContent = 'Add Application';
        document.getElementById('tileName').value = '';
        document.getElementById('tileDesc').value = '';
        document.getElementById('tilePath').value = '';
        document.getElementById('tileIcon').value = '';
        selectedColor = COLOR_PRESETS[0];
        deleteBtn.style.display = 'none';
      }

      document.getElementById('emojiSearch').value = '';
      renderColorPresets();
      renderEmojiPresets();
      modal.classList.add('active');
    }

    function closeTileModal() {
      document.getElementById('tileModal').classList.remove('active');
      editingId = null;
    }

    function saveTile() {
      const name = document.getElementById('tileName').value.trim();
      const desc = document.getElementById('tileDesc').value.trim();
      const path = document.getElementById('tilePath').value.trim();
      const icon = document.getElementById('tileIcon').value.trim() || '🔹';

      if (!name || !path) {
        showToast('Name and path are required', 'error');
        return;
      }

      if (editingId) {
        const tile = tiles.find(t => t.id === editingId);
        if (tile) {
          tile.name = name;
          tile.desc = desc;
          tile.path = path;
          tile.icon = icon;
          tile.color = selectedColor;
        }
      } else {
        const id = 'tile-' + Date.now();
        tiles.push({ id, name, desc, path, icon, color: selectedColor });
      }

      saveTiles();
      renderTiles();
      closeTileModal();
      showToast(editingId ? 'Tile updated' : 'Tile added', 'success');
    }

    function deleteCurrentTile() {
      if (!editingId) return;
      if (!confirm('Are you sure you want to delete this tile?')) return;
      tiles = tiles.filter(t => t.id !== editingId);
      saveTiles();
      renderTiles();
      closeTileModal();
      showToast('Tile deleted', 'success');
    }

    // ==================== Emoji Presets ====================
    function renderEmojiPresets(filter = '') {
      const container = document.getElementById('emojiPresets');
      if (!container) return;
      container.innerHTML = '';
      const currentIcon = document.getElementById('tileIcon').value.trim();
      const term = filter.toLowerCase().trim();
      const filtered = term
        ? RECOMMENDED_EMOJIS.filter(emoji => {
            const name = (EMOJI_NAMES[emoji] || '').toLowerCase();
            return emoji === term || name.includes(term);
          })
        : RECOMMENDED_EMOJIS;
      if (filtered.length === 0 && term) {
        const empty = document.createElement('div');
        empty.style.cssText = 'color: var(--text-muted); font-size: 0.85rem; padding: 8px 4px; width: 100%;';
        empty.textContent = 'No emojis found for "' + escapeHtml(term) + '"';
        container.appendChild(empty);
        return;
      }
      filtered.forEach(emoji => {
        const div = document.createElement('div');
        div.className = 'emoji-preset' + (emoji === currentIcon ? ' active' : '');
        div.textContent = emoji;
        div.title = (EMOJI_NAMES[emoji] || emoji).split(' ').slice(0, 2).join(' ');
        div.onclick = () => {
          document.getElementById('tileIcon').value = emoji;
          renderEmojiPresets(term);
        };
        container.appendChild(div);
      });
    }

    // ==================== Color Presets ====================
    function renderColorPresets() {
      const container = document.getElementById('colorPresets');
      container.innerHTML = '';
      COLOR_PRESETS.forEach(color => {
        const div = document.createElement('div');
        div.className = 'color-preset' + (color === selectedColor ? ' active' : '');
        div.style.background = color;
        div.onclick = () => {
          selectedColor = color;
          renderColorPresets();
        };
        container.appendChild(div);
      });
    }

    // ==================== Toast ====================
    function showToast(message, type) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.className = 'toast ' + type;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2500);
    }

    // ==================== Helpers ====================
    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/[<>&"']/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;',"'":'&#39;','"':'&quot;'}[c]));
    }

    function hexToRgba(hex, alpha) {
      const r = parseInt(hex.slice(1, 3), 16);
      const g = parseInt(hex.slice(3, 5), 16);
      const b = parseInt(hex.slice(5, 7), 16);
      return `rgba(${r}, ${g}, ${b}, ${alpha})`;
    }

    // ==================== Start ====================
    document.addEventListener('DOMContentLoaded', init);
  </script>

</body>
